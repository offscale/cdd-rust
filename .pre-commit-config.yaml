repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: \.(bat|cmd|ps1)$

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --
        language: system
        types: [rust]
        pass_filenames: true

      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace --all-targets
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-build
        name: cargo build
        entry: cargo build --workspace --all-targets
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace
        language: system
        pass_filenames: false
        types: [rust]

      - id: test-swagger-2
        name: Test Swagger 2.0 Petstore SDK
        entry: python3 scripts/test_sdk.py ../petstore.json ./target/petstore2
        language: system
        pass_filenames: false
        types: [rust]

      - id: test-openapi-3
        name: Test OpenAPI 3.2.0 Petstore SDK
        entry: python3 scripts/test_sdk.py ../petstore_oas3.json ./target/petstore3
        language: system
        pass_filenames: false
        types: [rust]

      - id: test-server-swagger-2
        name: Test Swagger 2.0 Petstore Server & Client
        entry: python3 scripts/test_server_and_client.py ../petstore.json ./target/server_petstore2 ./target/client_petstore2
        language: system
        pass_filenames: false
        types: [rust]

      - id: test-server-openapi-3
        name: Test OpenAPI 3.2.0 Petstore Server & Client
        entry: python3 scripts/test_server_and_client.py ../petstore_oas3.json ./target/server_petstore3 ./target/client_petstore3
        language: system
        pass_filenames: false
        types: [rust]

      - id: wasm-build
        name: WASM Build Test
        entry: python3 scripts/build_wasm.py
        language: system
        pass_filenames: false
        types: [rust]

      - id: update-coverage
        name: Update Coverage Badges
        entry: python3 scripts/update_coverage.py
        language: system
        pass_filenames: false
        always_run: true
